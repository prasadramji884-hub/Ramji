<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0e1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nilansh"/>
<title>Nilansh Creation</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f59e0b'/%3E%3Ctext x='50' y='72' font-family='Georgia,serif' font-size='62' font-weight='900' fill='%230a0e1a' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--sf:#111827;--s2:#1a2236;--s3:#1f2d45;
  --ac:#f59e0b;--gr:#10b981;--rd:#ef4444;--or:#f97316;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --bd:#1e2d45;--bd2:#2a3f5f;
  --glow:rgba(245,158,11,.15);--r:14px;--rs:8px;
}
body.light{
  --bg:#f0f4f8;--sf:#fff;--s2:#e8edf5;--s3:#dde4ef;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
  --bd:#cbd5e1;--bd2:#94a3b8;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1)}

/* ─── PIN OVERLAY ─── */
#PIN{
  position:fixed;inset:0;z-index:99999;
  background:radial-gradient(ellipse at 30% 20%,#1a2744,#0a0e1a);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.plogo{width:80px;height:80px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:#0a0e1a;box-shadow:0 12px 40px rgba(245,158,11,.4);margin-bottom:18px;font-family:Georgia,serif}
.ptitle{font-size:22px;font-weight:900;color:#f1f5f9;margin-bottom:4px}
.psub{font-size:11px;color:#64748b;margin-bottom:26px;letter-spacing:.5px;text-transform:uppercase}
.pdots{display:flex;gap:14px;margin-bottom:10px}
.pdot{width:16px;height:16px;border-radius:50%;border:2px solid #2a3f5f;background:transparent;transition:all .2s}
.pdot.on{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.5)}
.perr{color:#ef4444;font-size:12px;min-height:18px;margin-bottom:12px;text-align:center}
.ppad{display:grid;grid-template-columns:repeat(3,74px);gap:10px}
.pk{background:#111827;border:1px solid #1e2d45;border-radius:14px;height:60px;font-size:22px;font-weight:700;cursor:pointer;color:#f1f5f9;transition:background .1s;user-select:none}
.pk:active,.pk:hover{background:#1f2d45;border-color:#f59e0b}
.pk.del{font-size:16px;color:#94a3b8}
.pk.blank{background:transparent;border-color:transparent;cursor:default}

/* ─── APP SHELL ─── */
#APP{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

/* ─── HEADER ─── */
#HDR{background:linear-gradient(135deg,#0d1828,#162240);border-bottom:1px solid var(--bd);padding:12px 16px 10px;flex-shrink:0}
.htop{display:flex;align-items:center;gap:10px}
.hlogo{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#0a0e1a;font-family:Georgia,serif;box-shadow:0 4px 12px rgba(245,158,11,.4);flex-shrink:0}
.hname{font-size:17px;font-weight:900}
.hsub{font-size:9px;color:#f59e0b;letter-spacing:1.5px;text-transform:uppercase}
.hright{margin-left:auto;display:flex;gap:7px}
.hbtn{width:32px;height:32px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2)}
.hbtn:hover{border-color:var(--ac);color:var(--ac)}
.stats{display:flex;gap:8px;margin-top:10px}
.stat{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:7px 8px;text-align:center}
.stat .v{font-size:20px;font-weight:800;color:var(--ac);line-height:1}
.stat .l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.stat.g .v{color:var(--gr)}.stat.o .v{color:var(--or)}

/* ─── CONTENT ─── */
#CNT{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}

/* ─── NAV ─── */
#NAV{display:flex;background:#0d1526;border-top:1px solid var(--bd);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;color:var(--t3);font-size:10px;gap:3px;cursor:pointer;transition:color .15s}
.nb.on{color:var(--ac)}

/* ─── FAB ─── */
#FAB{position:fixed;bottom:70px;right:16px;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(245,158,11,.5);cursor:pointer;z-index:100;transition:transform .15s}
#FAB:active{transform:scale(.92)}

/* ─── SEARCH ─── */
.sbar{position:relative;margin-bottom:12px}
.sbar input{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px 11px 40px;color:var(--t1);font-size:14px;outline:none}
.sbar input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}
.sbar input::placeholder{color:var(--t3)}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.filters{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);font-size:12px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--ac);border-color:var(--ac);color:#0a0e1a;font-weight:700}
.chip.gon{background:var(--gr);border-color:var(--gr);color:#fff;font-weight:700}
.chip.oon{background:var(--or);border-color:var(--or);color:#fff;font-weight:700}

/* ─── CHALAN CARD ─── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer}
.card:hover{border-color:var(--bd2)}
.card.pending{border-left:3px solid var(--or)}
.card.partial{border-left:3px solid var(--ac)}
.card.received{border-left:3px solid var(--gr)}
.ctop{padding:12px 12px 0;display:flex;justify-content:space-between;align-items:flex-start}
.cparty{font-size:16px;font-weight:800}
.cmeta{font-size:11px;color:var(--t3);margin-top:2px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.badge.p{background:rgba(249,115,22,.15);color:var(--or);border:1px solid rgba(249,115,22,.3)}
.badge.r{background:rgba(16,185,129,.15);color:var(--gr);border:1px solid rgba(16,185,129,.3)}
.badge.x{background:rgba(245,158,11,.15);color:var(--ac);border:1px solid rgba(245,158,11,.3)}
.cbot{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--s2);margin-top:10px}
.cval{font-size:14px;font-weight:700}
.cacts{display:flex;gap:6px}
.ibtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--bd);background:var(--s3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2)}
.ibtn:hover{border-color:var(--ac);color:var(--ac)}

/* ─── SHEET ─── */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.sh{width:100%;max-width:600px;margin:0 auto;background:var(--sf);border-radius:20px 20px 0 0;max-height:94vh;display:flex;flex-direction:column;animation:sup .28s cubic-bezier(.16,1,.3,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shdrag{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.shhdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0}
.shtitle{font-size:18px;font-weight:800}
.shbody{overflow-y:auto;flex:1;padding:16px}
.shfoot{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0}

/* ─── FORM ─── */
.fg{margin-bottom:12px;position:relative}
.fl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.fi,.fsel{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--rs);padding:11px 12px;color:var(--t1);font-size:14px;outline:none;transition:border-color .2s}
.fi:focus,.fsel:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}
.fi::placeholder{color:var(--t3)}
.fsel{appearance:none}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr2h{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sec{font-size:13px;font-weight:700;color:var(--ac);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}
.aclist{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--rs);z-index:50;max-height:160px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.acitem{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.acitem:last-child{border-bottom:none}
.acitem:hover{background:var(--s2)}
.acdot{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0}
.icard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:12px;position:relative;margin-bottom:10px}
.inum{position:absolute;top:-7px;left:11px;background:var(--ac);color:#0a0e1a;font-size:10px;font-weight:800;padding:1px 8px;border-radius:10px}
.irm{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;border:none;background:rgba(239,68,68,.12);color:var(--rd);display:flex;align-items:center;justify-content:center;cursor:pointer}
.addibtn{width:100%;padding:10px;border-radius:var(--rs);border:1.5px dashed var(--bd2);background:none;color:var(--ac);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.addibtn:hover{border-color:var(--ac);background:var(--glow)}

/* ─── BUTTONS ─── */
.btn{padding:12px 18px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;flex:1;transition:opacity .15s}
.btn:active{opacity:.85}
.btnp{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0e1a}
.btns{background:var(--s2);color:var(--t2);border:1px solid var(--bd)}
.btnd{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.btno{background:rgba(249,115,22,.1);color:var(--or);border:1px solid rgba(249,115,22,.2)}
.btng{background:linear-gradient(135deg,#10b981,#059669);color:#fff}

/* ─── DETAIL ─── */
.dparty{font-size:24px;font-weight:900;padding:16px 16px 0}
.dchips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 16px 14px}
.dchip{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2)}
.dchip b{color:var(--t1)}
.rbars{display:flex;gap:8px;padding:0 16px 14px}
.rbar{flex:1;border-radius:var(--rs);padding:10px 12px}
.rbar.g{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2)}
.rbar.a{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}
.irow{background:var(--sf);border-radius:var(--rs);padding:12px;margin-bottom:9px;border:1px solid var(--bd)}
.irow.recv{border-color:rgba(16,185,129,.35)}
.iname{font-weight:700;font-size:14px}
.imeta{font-size:12px;color:var(--t2);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.ival{color:var(--ac);font-weight:700}
.rbtn{flex-shrink:0;padding:7px 11px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--s2);color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.rbtn.yes{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.12);color:var(--gr)}
.mkall{width:100%;padding:11px;border-radius:var(--rs);border:1px solid var(--bd2);background:none;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;font-family:inherit}
.mkall.do{border-color:rgba(16,185,129,.3);color:var(--gr)}
.mkall.undo{border-color:rgba(239,68,68,.3);color:var(--rd)}

/* ─── SUMMARY ─── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px}
.sc .sv{font-size:22px;font-weight:800;color:var(--ac)}
.sc .sl{font-size:10px;color:var(--t3);margin-top:3px}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:9px}
.pname{font-size:16px;font-weight:800;margin-bottom:9px}
.ptags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ptag{border-radius:7px;padding:5px 9px;font-size:11px}
.prog{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:2px}
.progb{height:100%;border-radius:3px;background:linear-gradient(90deg,#10b981,#059669)}
.prpct{font-size:10px;color:var(--t3);margin-top:3px;text-align:right}

/* ─── SETTINGS ─── */
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bd)}
.setrow:last-child{border-bottom:none}
.setlbl{font-size:14px;font-weight:600}
.setsub{font-size:11px;color:var(--t3);margin-top:2px}
.setbtn{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--s2);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.setbtn:hover{border-color:var(--ac)}

/* ─── MISC ─── */
.empty{text-align:center;padding:60px 20px}
.empty .ei{font-size:44px;opacity:.35;margin-bottom:12px}
.empty .et{font-size:18px;font-weight:700;color:var(--t2)}
.empty .es{font-size:13px;color:var(--t3);margin-top:5px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bd2);padding:10px 20px;border-radius:30px;font-size:13px;color:var(--t1);z-index:9000;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:fadeto 2.6s ease forwards;pointer-events:none}
@keyframes fadeto{0%{opacity:0;transform:translate(-50%,-8px)}12%{opacity:1;transform:translate(-50%,0)}80%{opacity:1}100%{opacity:0}}
.confirm{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:20px}
.cbox{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:24px;width:100%;max-width:320px}
.ctitle{font-size:17px;font-weight:800;margin-bottom:7px}
.cmsg{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:20px}
.cacts{display:flex;gap:9px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ─── DESKTOP ─── */
@media(min-width:769px){
  body{background:#060c18}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,#152038,#060c18);z-index:0}
  #PIN,#APP{z-index:1}
  #APP{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr}
  #HDR{grid-column:1/3;grid-row:1;padding:14px 28px;display:flex;align-items:center}
  .stats{margin-top:0;margin-left:auto}
  #NAV{grid-column:1;grid-row:2;flex-direction:column;border-top:none;border-right:1px solid var(--bd);padding:14px 10px;gap:4px;position:static;overflow-y:auto}
  .nb{flex-direction:row;justify-content:flex-start;padding:11px 14px;border-radius:10px;font-size:13px;gap:10px}
  .nb.on{background:rgba(245,158,11,.1)}
  #CNT{grid-column:2;grid-row:2;padding:20px 28px 100px}
  #FAB{bottom:28px;right:28px;width:56px;height:56px}
  .sh{border-radius:16px;margin-bottom:40px}
  .ov{align-items:center}
  #PIN{background:radial-gradient(ellipse at 50% 30%,#1a2744,#060c18)}
}
@media(max-width:768px){
  #NAV{position:sticky;bottom:0;z-index:50}
  #FAB{position:fixed;bottom:70px;right:16px}
}
</style>
</head>
<body>

<!-- ═══ PIN SCREEN ═══ -->
<div id="PIN">
  <div class="plogo">N</div>
  <div class="ptitle">Nilansh Creation</div>
  <div class="psub">Dispatch Manager · Private</div>
  <div class="pdots" id="PDOTS">
    <div class="pdot" id="pd0"></div>
    <div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div>
    <div class="pdot" id="pd3"></div>
  </div>
  <div class="perr" id="PERR"></div>
  <div class="ppad">
    <button class="pk" onclick="PK('1')">1</button>
    <button class="pk" onclick="PK('2')">2</button>
    <button class="pk" onclick="PK('3')">3</button>
    <button class="pk" onclick="PK('4')">4</button>
    <button class="pk" onclick="PK('5')">5</button>
    <button class="pk" onclick="PK('6')">6</button>
    <button class="pk" onclick="PK('7')">7</button>
    <button class="pk" onclick="PK('8')">8</button>
    <button class="pk" onclick="PK('9')">9</button>
    <button class="pk blank" disabled></button>
    <button class="pk" onclick="PK('0')">0</button>
    <button class="pk del" onclick="PDEL()">⌫</button>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="APP">
  <div id="HDR">
    <div class="htop">
      <div class="hlogo">N</div>
      <div style="margin-left:8px;flex:1">
        <div class="hname">Nilansh Creation</div>
        <div class="hsub">Dispatch Manager</div>
      </div>
      <div class="hright">
        <div class="hbtn" onclick="LOCK()" title="Lock">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" id="ST">0</div><div class="l">Total</div></div>
      <div class="stat o"><div class="v" id="SP">0</div><div class="l">Pending</div></div>
      <div class="stat g"><div class="v" id="SR">0</div><div class="l">Received</div></div>
    </div>
  </div>
  <div id="CNT"></div>
  <button id="FAB" onclick="openForm(null)" title="New Chalan [+]">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <div id="NAV">
    <button class="nb on" id="nb0" onclick="TAB('chalans',0)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Chalans
    </button>
    <button class="nb" id="nb1" onclick="TAB('summary',1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Summary
    </button>
    <button class="nb" id="nb2" onclick="TAB('settings',2)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </div>
</div>

<div id="OVR"></div>
<div id="TST"></div>
<iframe id="PF" style="display:none;position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none"></iframe>

<script>
'use strict';
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
var SK='nc_d4', PK_='nc_p4', UK='nc_u4', TK='nc_t4', GFK='nc_gf4', GTK='nc_gt4', GCK='nc_gc4';
var ADMIN='Ramji@7861', DEFPIN='5555';
var DEFUNITS=['pcs','mtr','kg','set','dz','box','ltr','gm','pair'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var DB=[], UNITS=[], TABname='chalans', SQ='', FILT='all', DARK=true, gTok=null;
var FItems=[], FCid=null;

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
function LS(k){try{return localStorage.getItem(k)}catch{return null}}
function SS(k,v){try{localStorage.setItem(k,v)}catch{}}
function loadDB(){try{var r=LS(SK);return r?JSON.parse(r):[]}catch{return[]}}
function saveDB(){try{SS(SK,JSON.stringify(DB))}catch{}}
function loadUnits(){try{var r=LS(UK);return r?JSON.parse(r):DEFUNITS.slice()}catch{return DEFUNITS.slice()}}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){return new Date().toISOString().split('T')[0]}
function fmt(d){if(!d)return'';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){var e=document.createElement('div');e.className='toast';e.textContent=m;document.getElementById('TST').appendChild(e);setTimeout(function(){e.remove()},2700)}
function persist(){saveDB();syncDrive();updateStats();render()}
function getPin(){return LS(PK_)||DEFPIN}

// ═══════════════════════════════════════════════
// PIN — completely isolated, no dependencies
// ═══════════════════════════════════════════════
var pe='';
function PK(k){
  if(pe.length>=4)return;
  pe+=k;
  updDots();
  if(pe.length===4)setTimeout(chkPin,150);
}
function PDEL(){
  pe=pe.slice(0,-1);
  updDots();
  document.getElementById('PERR').textContent='';
}
function updDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(!d)continue;
    if(i<pe.length){
      d.style.background='#f59e0b';
      d.style.borderColor='#f59e0b';
      d.style.boxShadow='0 0 8px rgba(245,158,11,.5)';
    } else {
      d.style.background='transparent';
      d.style.borderColor='#2a3f5f';
      d.style.boxShadow='none';
    }
  }
}
function chkPin(){
  if(pe===getPin()){
    document.getElementById('PIN').style.display='none';
    // APP already visible via CSS
    sessionStorage.setItem('nc_sess','1');
    startApp();
  } else {
    document.getElementById('PERR').textContent='Wrong PIN. Try again.';
    pe='';
    updDots();
    var dots=document.getElementById('PDOTS');
    if(dots){dots.style.animation='none';void dots.offsetHeight;dots.style.animation='shake .4s ease'}
  }
}
function LOCK(){
  sessionStorage.removeItem('nc_sess');
  pe='';updDots();
  document.getElementById('PERR').textContent='';
  // APP always visible behind PIN screen
  document.getElementById('PIN').style.display='flex';
}

// Keyboard PIN entry
document.addEventListener('keydown',function(e){
  if(document.getElementById('PIN').style.display==='none')return;
  if(e.key>='0'&&e.key<='9'){e.preventDefault();PK(e.key);}
  if(e.key==='Backspace'){e.preventDefault();PDEL();}
});

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
// APP always visible behind PIN screen

if(sessionStorage.getItem('nc_sess')){
  document.getElementById('PIN').style.display='none';
  // APP already visible via CSS
  startApp();
}

function startApp(){
  // Theme
  var th=LS(TK); DARK=(th!=='light');
  document.body.classList.toggle('light',!DARK);
  // Data
  DB=loadDB(); UNITS=loadUnits();
  updateStats(); render();
  // Cloud sync
  loadDrive().then(function(){updateStats();render();});
  // Auto sync every 30s
  setInterval(function(){if(navigator.onLine)loadDrive().then(function(){updateStats();render();});},30000);
  // App keyboard shortcuts
  document.addEventListener('keydown',appKeys);
}

// ═══════════════════════════════════════════════
// APP KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
function appKeys(e){
  if(document.getElementById('PIN').style.display!=='none')return;
  var ov=document.getElementById('OVR').innerHTML.trim()!=='';
  var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
  var inp=(tag==='input'||tag==='textarea'||tag==='select');

  if(ov){
    if(e.key==='Escape'){e.preventDefault();closeOv();}
    if(e.key==='Enter'&&e.shiftKey){e.preventDefault();saveForm(true);}
    else if(e.key==='Enter'&&!inp){e.preventDefault();saveForm(false);}
    else if(e.key==='Enter'&&inp){
      e.preventDefault();
      var all=Array.from(document.querySelectorAll('.shbody input.fi,.shbody select.fsel,.shbody input[type=date]'));
      var idx=all.indexOf(document.activeElement);
      if(idx>=0&&idx<all.length-1){all[idx+1].focus();if(all[idx+1].select)all[idx+1].select();}
      else saveForm(false);
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){var ab=document.querySelector('.addibtn');if(ab){e.preventDefault();ab.click();}}
    return;
  }
  if(!inp){
    if(e.key==='+'||e.key==='='||e.key==='n'||e.key==='N'){e.preventDefault();openForm(null);}
    if(e.key==='1'){e.preventDefault();TAB('chalans',0);}
    if(e.key==='2'){e.preventDefault();TAB('summary',1);}
    if(e.key==='3'){e.preventDefault();TAB('settings',2);}
    if(e.key==='/'||(e.ctrlKey&&e.key==='f')){e.preventDefault();var s=document.querySelector('.sbar input');if(s){s.focus();s.select();}}
    if(e.key==='l'||e.key==='L'){e.preventDefault();LOCK();}
  }
  if(e.key==='Escape'&&inp){var sr=document.querySelector('.sbar input');if(document.activeElement===sr){SQ='';sr.value='';sr.blur();render();}}
}

// ═══════════════════════════════════════════════
// STATS & TAB
// ═══════════════════════════════════════════════
function updateStats(){
  document.getElementById('ST').textContent=DB.length;
  document.getElementById('SP').textContent=DB.filter(function(c){return c.items.some(function(i){return!i.received})}).length;
  document.getElementById('SR').textContent=DB.filter(function(c){return c.items.length&&c.items.every(function(i){return i.received})}).length;
}
function TAB(name,idx){
  TABname=name;
  document.querySelectorAll('.nb').forEach(function(b,i){b.classList.toggle('on',i===idx)});
  document.getElementById('FAB').style.display=(name==='chalans'?'flex':'none');
  render();
}
function getStatus(c){
  if(!c.items.length)return'pending';
  if(c.items.every(function(i){return i.received}))return'received';
  if(c.items.every(function(i){return!i.received}))return'pending';
  return'partial';
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  var el=document.getElementById('CNT');
  if(TABname==='chalans')el.innerHTML=renderChalans();
  else if(TABname==='summary')el.innerHTML=renderSummary();
  else el.innerHTML=renderSettings();
}

function getFiltered(){
  var q=SQ.toLowerCase();
  return DB.filter(function(c){
    var mq=!q||c.party.toLowerCase().includes(q)||c.chalanNo.toLowerCase().includes(q)||c.items.some(function(i){return i.item.toLowerCase().includes(q)||(i.designNo||'').toLowerCase().includes(q)});
    var ar=c.items.every(function(i){return i.received}), nr=c.items.every(function(i){return!i.received});
    var mf=FILT==='all'?true:FILT==='pending'?nr:FILT==='received'?ar:!ar&&!nr;
    return mq&&mf;
  }).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
}

function renderChalans(){
  var fl=getFiltered();
  var chips=[['all','All'],['pending','Pending'],['partial','Partial'],['received','Received']].map(function(x){
    var cls=FILT===x[0]?(x[0]==='received'?'gon':x[0]==='pending'?'oon':'on'):'';
    return '<button class="chip '+cls+'" onclick="setFilt(\''+x[0]+'\')">'+x[1]+'</button>';
  }).join('');

  var cards=fl.length?fl.map(function(c){
    var st=getStatus(c);
    var tot=c.items.reduce(function(s,i){return s+(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0)},0);
    var bc=st==='received'?'r':st==='partial'?'x':'p';
    var bt=st==='received'?'Received':st==='partial'?'Partial':'Pending';
    return '<div class="card '+st+'" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="ctop"><div><div class="cparty">'+esc(c.party)+'</div>'+
      '<div class="cmeta">Chalan #'+esc(c.chalanNo)+' &nbsp;·&nbsp; '+c.items.length+' item'+(c.items.length!==1?'s':'')+' &nbsp;·&nbsp; '+fmt(c.date)+'</div></div>'+
      '<span class="badge '+bc+'">'+bt+'</span></div>'+
      '<div class="cbot"><div class="cval" style="color:'+(tot>0?'var(--ac)':'var(--t3)')+'">'+
      (tot>0?'₹'+tot.toLocaleString('en-IN'):c.items.length+' items')+'</div>'+
      '<div class="cacts">'+
      '<div class="ibtn" onclick="event.stopPropagation();openDetail(\''+c.id+'\')" title="View"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>'+
      '<div class="ibtn" onclick="event.stopPropagation();printC(\''+c.id+'\')" title="Print"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></div>'+
      '<div class="ibtn" onclick="event.stopPropagation();openForm(\''+c.id+'\')" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>'+
      '<div class="ibtn" onclick="event.stopPropagation();delC(\''+c.id+'\')" title="Delete" style="color:var(--rd)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>'+
      '</div></div></div>';
  }).join(''):'<div class="empty"><div class="ei">📦</div><div class="et">'+(DB.length===0?'No chalans yet':'No results')+'</div><div class="es">'+(DB.length===0?'Press + to add your first chalan':'Try a different search or filter')+'</div></div>';

  return '<div class="sbar"><span class="sico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>'+
    '<input placeholder="Search party, chalan, item, design..." value="'+esc(SQ)+'" oninput="SQ=this.value;render()"/></div>'+
    '<div class="filters">'+chips+'</div>'+
    '<div style="padding-bottom:20px">'+cards+'</div>';
}

function setFilt(v){FILT=v;render();}

function renderSummary(){
  var ti=DB.reduce(function(s,c){return s+c.items.length},0);
  var tv=DB.reduce(function(s,c){return s+c.items.reduce(function(ss,i){return ss+(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0)},0)},0);
  var ri=DB.reduce(function(s,c){return s+c.items.filter(function(i){return i.received}).length},0);
  var pm={};
  DB.forEach(function(c){
    if(!pm[c.party])pm[c.party]={ch:0,it:0,rc:0,val:0};
    pm[c.party].ch++;
    c.items.forEach(function(i){pm[c.party].it++;if(i.received)pm[c.party].rc++;pm[c.party].val+=(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0);});
  });
  var parties=Object.entries(pm).sort(function(a,b){return b[1].ch-a[1].ch});
  var pcards=parties.map(function(x){
    var n=x[0],d=x[1],pct=d.it>0?Math.round(d.rc/d.it*100):0;
    return '<div class="pc"><div class="pname">'+esc(n)+'</div>'+
      '<div class="ptags">'+
      '<span class="ptag" style="background:var(--s2)">Chalans: <b>'+d.ch+'</b></span>'+
      '<span class="ptag" style="background:var(--s2)">Items: <b>'+d.it+'</b></span>'+
      '<span class="ptag" style="background:rgba(16,185,129,.08);color:var(--gr)">Recv: <b>'+d.rc+'</b></span>'+
      '<span class="ptag" style="background:rgba(249,115,22,.08);color:var(--or)">Pending: <b>'+(d.it-d.rc)+'</b></span>'+
      (d.val>0?'<span class="ptag" style="background:rgba(245,158,11,.08);color:var(--ac)">₹'+d.val.toLocaleString('en-IN')+'</span>':'')+
      '</div><div class="prog"><div class="progb" style="width:'+pct+'%"></div></div>'+
      '<div class="prpct">'+pct+'% received</div></div>';
  }).join('')||'<div class="empty"><div class="ei">📊</div><div class="et">No data yet</div></div>';

  return '<div class="sgrid">'+
    '<div class="sc"><div class="sv">'+DB.length+'</div><div class="sl">Total Chalans</div></div>'+
    '<div class="sc"><div class="sv">'+ti+'</div><div class="sl">Total Items</div></div>'+
    '<div class="sc" style="border-color:rgba(16,185,129,.3)"><div class="sv" style="color:var(--gr)">'+ri+'</div><div class="sl">Items Received</div></div>'+
    '<div class="sc" style="border-color:rgba(249,115,22,.3)"><div class="sv" style="color:var(--or)">'+(ti-ri)+'</div><div class="sl">Items Pending</div></div>'+
    '</div>'+
    (tv>0?'<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--t3)">Total Dispatch Value</span><span style="font-size:20px;font-weight:800;color:var(--ac)">₹'+tv.toLocaleString('en-IN')+'</span></div>':'')+
    '<div class="sec">Party-wise</div>'+
    '<div style="padding-bottom:20px">'+pcards+'</div>';
}

function renderSettings(){
  var sbUrl=LS('nc_sburl')||'', sbKey=LS('nc_sbkey')||'', sbConn=!!(sbUrl&&sbKey);
  var unitTags=UNITS.map(function(u){
    return '<span style="display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:5px 10px;font-size:13px;margin:3px">'+
      esc(u)+'<button onclick="rmUnit(\''+esc(u)+'\')" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:15px;line-height:1;padding:0 2px">&times;</button></span>';
  }).join('');

  return '<div style="padding-bottom:30px">'+

    '<div class="sec">Appearance</div>'+
    '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:0 14px">'+
    '<div class="setrow"><div><div class="setlbl">'+(DARK?'🌙 Dark Mode':'☀️ Light Mode')+'</div><div class="setsub">Tap to switch theme</div></div>'+
    '<button class="setbtn" onclick="toggleTheme()">'+(DARK?'☀️ Light':'🌙 Dark')+'</button></div></div>'+

    '<div class="sec" style="margin-top:18px">Cloud Sync (Supabase — Free)</div>'+
    '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px">'+
    '<div style="padding:10px 12px;border-radius:var(--rs);margin-bottom:14px;background:'+(sbConn?'rgba(16,185,129,.08)':'rgba(249,115,22,.08)')+';border:1px solid '+(sbConn?'rgba(16,185,129,.25)':'rgba(249,115,22,.25)')+'">'+
    '<b style="color:'+(sbConn?'var(--gr)':'var(--or)')+';">'+(sbConn?'🟢 Supabase Connected — syncing across devices':'🔴 Not connected — data is local only')+'</b>'+
    '<div style="font-size:11px;color:var(--t3);margin-top:3px">'+(sbConn?'All devices sync automatically when online':'Setup takes 3 minutes · completely free · no credit card')+'</div></div>'+
    (sbConn?
      '<div style="font-size:11px;color:var(--t3);margin-bottom:10px;word-break:break-all">URL: '+esc(sbUrl||'')+'</div>'+
      '<button class="setbtn" style="width:100%;margin-bottom:8px;background:linear-gradient(135deg,var(--ac),#d97706);color:#0a0e1a;font-weight:700;border:none" onclick="manualSync()">🔄 Sync Now</button>'+
      '<button class="setbtn" style="width:100%" onclick="sbDisconnect()">Disconnect</button>'
    :
      '<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:var(--rs);padding:10px;margin-bottom:14px;font-size:12px;color:var(--t2);line-height:1.6">'+
      '💡 <b>Free setup at supabase.com:</b><br/>'+
      '1. Sign up free → New Project → name it <b>nilansh</b><br/>'+
      '2. Settings → API → copy <b>Project URL</b> and <b>anon key</b><br/>'+
      '3. SQL Editor → run: <code style="background:var(--s2);padding:1px 5px;border-radius:3px">create table if not exists nilansh_data (id text primary key default 'main', chalans jsonb default '[]'::jsonb, updated_at timestamptz default now()); insert into nilansh_data (id,chalans) values ('main','[]') on conflict do nothing;</code><br/>'+
      '4. Paste URL and key below → Save</div>'+
      '<div class="fg"><label class="fl">Supabase Project URL</label>'+
      '<input class="fi" id="sburl" placeholder="https://xxxx.supabase.co" value="'+esc(sbUrl||'')+'" style="font-size:12px;font-family:monospace"/></div>'+
      '<div class="fg"><label class="fl">Supabase Anon Key</label>'+
      '<input class="fi" id="sbkey" placeholder="eyJhbGciOiJIUzI1NiIs..." value="'+esc(sbKey||'')+'" style="font-size:12px;font-family:monospace"/></div>'+
      '<button class="setbtn" style="width:100%;padding:13px;font-weight:700;background:linear-gradient(135deg,#3ecf8e,#1a9c6a);color:#fff;border:none;border-radius:var(--rs);font-size:14px" onclick="sbConnect()">Connect Supabase</button>'
    )+'</div>'+

    '<div class="sec" style="margin-top:18px">Security</div>'+
    '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:0 14px">'+
    '<div class="setrow"><div><div class="setlbl">Change PIN</div><div class="setsub">Requires admin password</div></div>'+
    '<button class="setbtn" onclick="openChangePin()">Change</button></div>'+
    '<div class="setrow"><div><div class="setlbl">Lock App</div><div class="setsub">Return to PIN screen</div></div>'+
    '<button class="setbtn" onclick="LOCK()">Lock</button></div></div>'+

    '<div class="sec" style="margin-top:18px">Units</div>'+
    '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px">'+
    '<div style="font-size:12px;color:var(--t3);margin-bottom:10px">Units available in the item form</div>'+
    '<div style="flex-wrap:wrap;display:flex;gap:2px;margin-bottom:12px">'+unitTags+'</div>'+
    '<div style="display:flex;gap:8px">'+
    '<input class="fi" id="nuin" placeholder="New unit e.g. roll" style="flex:1;padding:9px 11px;font-size:13px" onkeydown="if(event.key===\'Enter\')addUnit()"/>'+

      (item.received&&item.receivedDate?'<div style="font-size:11px;color:var(--gr);margin-top:4px">✓ Received '+fmt(item.receivedDate)+'</div>':'')+

}
function togItem(cid,iid){
  DB=DB.map(function(c){
    if(c.id!==cid)return c;
    return Object.assign({},c,{items:c.items.map(function(i){
      if(i.id!==iid)return i;
      var nr=!i.received;
      return Object.assign({},i,{received:nr,receivedDate:nr?today():''});
    })});
  });
  persist();
  var c=DB.find(function(x){return x.id===cid});
  if(c)renderOv(detHTML(c));
  toast('Status updated ✓');
}
function markAll(cid){
  DB=DB.map(function(c){
    if(c.id!==cid)return c;
    var done=c.items.every(function(i){return i.received});
    return Object.assign({},c,{items:c.items.map(function(i){return Object.assign({},i,{received:!done,receivedDate:!done?today():''});})});
  });
  persist();
  var c=DB.find(function(x){return x.id===cid});
  if(c)renderOv(detHTML(c));
  toast('Updated all items');
}

// Autocomplete helpers
function showPAC(v){var l=document.getElementById('pac');if(!l)return;var q=v.toLowerCase();var m=[...new Set(DB.map(function(c){return c.party}))].sort().filter(function(p){return p.toLowerCase().includes(q)&&p!==v});l.style.display=m.length?'block':'none';l.innerHTML=m.slice(0,8).map(function(p){return'<div class="acitem" onmousedown="selPAC(\''+esc(p)+'\')"><span class="acdot"></span>'+esc(p)+'</div>'}).join('');}
function hidePAC(){var l=document.getElementById('pac');if(l)l.style.display='none';}
function selPAC(v){var i=document.getElementById('fp');if(i){i.value=v;hidePAC();}}
function showIAC(id,v){var l=document.getElementById('iac'+id);if(!l)return;var q=v.toLowerCase();var its=[...new Set(DB.flatMap(function(c){return c.items.map(function(i){return i.item})}).filter(Boolean))].sort();var m=its.filter(function(x){return x.toLowerCase().includes(q)&&x!==v});l.style.display=m.length?'block':'none';l.innerHTML=m.slice(0,8).map(function(x){return'<div class="acitem" onmousedown="selIAC(\''+id+'\',\''+esc(x)+'\')"><span class="acdot" style="background:var(--gr)"></span>'+esc(x)+'</div>'}).join('');}
function hideIAC(id){var l=document.getElementById('iac'+id);if(l)l.style.display='none';}
function selIAC(id,v){updFI(id,'item',v);hideIAC(id);var el=document.querySelector('#ic'+id+' input.fi');if(el)el.value=v;}
function showSAC(id,v){var l=document.getElementById('sac'+id);if(!l)return;var sns=[...new Set(DB.flatMap(function(c){return c.items.map(function(i){return i.supplierNo})}).filter(Boolean))].sort();var m=sns.filter(function(x){return x.includes(v)&&x!==v});l.style.display=m.length?'block':'none';l.innerHTML=m.slice(0,6).map(function(x){return'<div class="acitem" onmousedown="selSAC(\''+id+'\',\''+esc(x)+'\')"><span class="acdot" style="background:#818cf8"></span>'+esc(x)+'</div>'}).join('');}
function hideSAC(id){var l=document.getElementById('sac'+id);if(l)l.style.display='none';}
function selSAC(id,v){updFI(id,'supplierNo',v);hideSAC(id);}
function updFI(id,f,v){var i=FItems.find(function(x){return x.id===id});if(i){i[f]=v;updFTot();}}
function updFTot(){var el=document.getElementById('ftot');if(!el)return;var t=FItems.reduce(function(s,i){return s+(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0)},0);el.innerHTML=t>0?'Total: <b style="color:var(--ac);font-size:17px">₹'+t.toLocaleString('en-IN')+'</b>':'';}
function addFItem(){FItems.push(newItem());var ex=FCid?DB.find(function(c){return c.id===FCid}):null;renderOv(formHTML(ex));setTimeout(function(){var last=document.querySelectorAll('.icard');if(last.length){var inp=last[last.length-1].querySelector('input.fi');if(inp)inp.focus();}},120);}
function rmFItem(id){FItems=FItems.filter(function(i){return i.id!==id});var ex=FCid?DB.find(function(c){return c.id===FCid}):null;renderOv(formHTML(ex));}
function saveForm(openNew){
  var party=(document.getElementById('fp')?document.getElementById('fp').value:'').trim();
  var cn=(document.getElementById('fcn')?document.getElementById('fcn').value:'').trim();
  var dt=document.getElementById('fdt')?document.getElementById('fdt').value:today();
  var nt=(document.getElementById('fnt')?document.getElementById('fnt').value:'').trim();
  if(!party){toast('⚠ Party name required');var p=document.getElementById('fp');if(p)p.focus();return;}
  if(!cn){toast('⚠ Chalan number required');var c=document.getElementById('fcn');if(c)c.focus();return;}
  if(FItems.some(function(i){return!i.item.trim()})){toast('⚠ Item name required');return;}
  var data={id:FCid||uid(),party:party,chalanNo:cn,date:dt,notes:nt,items:FItems};
  if(FCid){DB=DB.map(function(c){return c.id===FCid?data:c});toast('Chalan updated ✓');}
  else{DB=[data].concat(DB);toast(openNew?'Saved ✓':'Chalan saved ✓');}
  persist();
  if(openNew){setTimeout(function(){openForm(null);},50);}
  else{closeOv();}
}

  document.getElementById('OVR').innerHTML='<div class="confirm">'+
    '<div class="cbox"><div class="ctitle">Delete Chalan?</div>'+

function doChangePin(){
  var ap=document.getElementById('cp1')?document.getElementById('cp1').value:'';
  var np=document.getElementById('cp2')?document.getElementById('cp2').value:'';
  var rp=document.getElementById('cp3')?document.getElementById('cp3').value:'';

  if(ap!==ADMIN){if(err)err.textContent='Wrong admin password';return;}

}

    '<td>'+(item.supplierNo||'-')+'</td><td>'+(item.supplierChalanNo||'-')+'</td>'+
    '<td>'+(item.qty||'-')+' '+(item.unit||'')+'</td><td>₹'+(item.rate||'-')+'</td>'+
    '<td>'+(amt>0?'₹'+amt.toLocaleString('en-IN'):'-')+'</td>'+

    '<div style="font-size:13px;margin-top:6px"><b>Party:</b> '+c.party+(c.notes?' &nbsp;|&nbsp; <b>Notes:</b> '+c.notes:'')+'</div></div>'+
    '<table style="width:100%;border-collapse:collapse">'+
    '<thead><tr style="background:#f0f0f0"><th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">#</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Item</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Design</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Sup.No</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Sup.Chalan</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Qty</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Rate</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Amount</th>'+
    '<th style="padding:7px 6px;text-align:left;border:1px solid #ccc;font-size:11px">Status</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    (tot>0?'<tfoot><tr><td colspan="7" style="text-align:right;font-weight:700;padding:7px;border:1px solid #ccc">Total:</td><td colspan="2" style="font-weight:700;padding:7px;border:1px solid #ccc">₹'+tot.toLocaleString('en-IN')+'</td></tr></tfoot>':'')+

    '<div style="margin-top:12px;font-size:10px;color:#888;border-top:1px solid #ccc;padding-top:7px">Nilansh Creation · Printed '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})+' · '+c.items.filter(function(i){return i.received}).length+'/'+c.items.length+' items received</div></div>';

function doPrint(body){
  var css='*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;padding:18px;color:#000;background:#fff}.pc{margin-bottom:24px}@media print{.pc{page-break-after:always}.pc:last-child{page-break-after:avoid}.noprint{display:none}}';
  var fr=document.getElementById('PF');
  fr.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9998;opacity:0';
  var doc=fr.contentDocument||fr.contentWindow.document;
  doc.open();doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>'+css+'</style></head><body>'+body+'</body></html>');doc.close();
  setTimeout(function(){fr.contentWindow.focus();fr.contentWindow.print();setTimeout(function(){fr.style.cssText='display:none;position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';},2000);},400);
}
function printC(id){var c=DB.find(function(x){return x.id===id});if(!c)return;toast('Opening print...');doPrint(printHTML(c));}
function exportPDF(){if(!DB.length){toast('No chalans');return;}toast('Opening print...');doPrint(DB.map(printHTML).join(''));}

// ═══════════════════════════════════════════════
// EXCEL
// ═══════════════════════════════════════════════
function exportCSV(){
  if(!DB.length){toast('No data');return;}
  var hdr='Party,Chalan No,Date,Item,Design No,Supplier No,Supplier Chalan,Qty,Unit,Rate,Amount,Status,Received Date,Notes,Chalan Notes\r\n';
  var rows=DB.flatMap(function(c){return c.items.map(function(i){var amt=(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0);return[c.party,c.chalanNo,c.date,i.item,i.designNo||'',i.supplierNo||'',i.supplierChalanNo||'',i.qty||'',i.unit||'pcs',i.rate||'',amt||'',i.received?'Received':'Pending',i.receivedDate||'',i.notes||'',c.notes||''].map(function(v){var s=String(v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',');})}).join('\r\n');
  var blob=new Blob(['\uFEFF'+hdr+rows],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='NilanshCreation_'+today()+'.csv';a.click();
  toast('✓ Downloaded');
}
function importCSV(inp){
  var file=inp.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var txt=e.target.result.replace(/^\uFEFF/,'');
      var lines=txt.split(/\r?\n/).filter(function(l){return l.trim()});
      if(lines.length<2){toast('⚠ Empty file');return;}
      function parseL(line){var r=[],cur='',inq=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(inq&&line[i+1]==='"'){cur+='"';i++;}else inq=!inq;}else if(ch===','&&!inq){r.push(cur);cur='';}else cur+=ch;}r.push(cur);return r;}
      var hdrs=parseL(lines[0]).map(function(h){return h.trim().toLowerCase()});
      var hi=function(n){return hdrs.indexOf(n)};
      var map={};
      for(var i=1;i<lines.length;i++){
        var cols=parseL(lines[i]);
        var party=(cols[hi('party')]||'').trim(),cn=(cols[hi('chalan no')]||'').trim();
        if(!party||!cn)continue;
        var key=party+'||'+cn;
        if(!map[key])map[key]={id:uid(),party:party,chalanNo:cn,date:(cols[hi('date')]||today()).trim(),notes:(cols[hi('chalan notes')]||'').trim(),items:[]};
        var itm=(cols[hi('item')]||'').trim();
        if(itm)map[key].items.push({id:uid(),item:itm,designNo:(cols[hi('design no')]||'').trim(),supplierNo:(cols[hi('supplier no')]||'').trim(),supplierChalanNo:(cols[hi('supplier chalan')]||'').trim(),qty:(cols[hi('qty')]||'').trim(),unit:(cols[hi('unit')]||'pcs').trim(),rate:(cols[hi('rate')]||'').trim(),notes:(cols[hi('notes')]||'').trim(),received:(cols[hi('status')]||'').toLowerCase()==='received',receivedDate:(cols[hi('received date')]||'').trim()});
      }
      var imp=Object.values(map).filter(function(c){return c.items.length});
      if(!imp.length){toast('⚠ No valid data');return;}
      var ex=new Set(DB.map(function(c){return c.party+'||'+c.chalanNo}));
      var add=imp.filter(function(c){return!ex.has(c.party+'||'+c.chalanNo)});
      DB=add.concat(DB);persist();
      toast('✓ Imported '+add.length+(imp.length-add.length?' ('+( imp.length-add.length)+' skipped)':''));
    }catch(err){toast('⚠ Error reading file');console.error(err);}
  };
  rd.readAsText(file,'utf-8');inp.value='';
}

// ═══════════════════════════════════════════════
// SUPABASE SYNC — free, no credit card needed
// supabase.com → free forever plan
// ═══════════════════════════════════════════════
function getSbCreds(){return{url:LS('nc_sburl')||'',key:LS('nc_sbkey')||''};}

function sbConnect(){
  var url=(document.getElementById('sburl')?document.getElementById('sburl').value:'').trim();
  var key=(document.getElementById('sbkey')?document.getElementById('sbkey').value:'').trim();
  if(!url||!key){toast('⚠ Enter both URL and Key');return;}
  if(!url.startsWith('https://')){toast('⚠ URL must start with https://');return;}
  var pw=prompt('Enter admin password to connect:');
  if(pw!==ADMIN){toast('⚠ Wrong admin password');return;}
  SS('nc_sburl',url);SS('nc_sbkey',key);
  toast('Connecting...');
  syncDrive().then(function(){
    loadDrive().then(function(){updateStats();render();toast('✓ Connected!');});
  });
}
function sbDisconnect(){
  var pw=prompt('Enter admin password to disconnect:');
  if(pw!==ADMIN){toast('⚠ Wrong admin password');return;}
  localStorage.removeItem('nc_sburl');localStorage.removeItem('nc_sbkey');
  toast('Disconnected');render();
}
async function syncDrive(){
  var cr=getSbCreds();if(!cr.url||!cr.key)return;
  try{
    // Try PATCH first (update existing row)
    var res=await fetch(cr.url+'/rest/v1/nilansh_data?id=eq.main',{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':cr.key,'Authorization':'Bearer '+cr.key,'Prefer':'return=minimal'},
      body:JSON.stringify({chalans:DB,updated_at:new Date().toISOString()})
    });
    // If no row found, INSERT
    if(res.status===404||res.status===406){
      await fetch(cr.url+'/rest/v1/nilansh_data',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':cr.key,'Authorization':'Bearer '+cr.key,'Prefer':'return=minimal'},
        body:JSON.stringify({id:'main',chalans:DB,updated_at:new Date().toISOString()})
      });
    }
  }catch(ex){console.log('Sync err:',ex);}
}
async function loadDrive(){
  var cr=getSbCreds();if(!cr.url||!cr.key)return;
  try{
    var res=await fetch(cr.url+'/rest/v1/nilansh_data?id=eq.main&select=chalans',{
      headers:{'apikey':cr.key,'Authorization':'Bearer '+cr.key}
    });
    if(!res.ok)return;
    var rows=await res.json();
    if(!rows||!rows.length)return;
    var cloud=rows[0].chalans;
    if(!Array.isArray(cloud)||!cloud.length)return;
    // Smart merge — combine local and cloud, keep most complete version
    var map={};
    DB.forEach(function(c){map[c.id]=c;});
    cloud.forEach(function(c){
      if(!map[c.id])map[c.id]=c;
      else if(c.items.length>=map[c.id].items.length)map[c.id]=c;
    });
    DB=Object.values(map).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    saveDB();
  }catch(ex){console.log('Load err:',ex);}
}
async function manualSync(){toast('Syncing...');await loadDrive();await syncDrive();updateStats();render();toast('✓ Synced');}
